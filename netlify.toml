# Netlify configuration for the Case Refinement triage bot.
#
# Two functions in this project:
# - `poll-alerts`        runs on a 15-minute schedule. Fast: just polls
#                        Slack for new alerts and dispatches a background
#                        function per alert.
# - `triage-background`  marked as background by the `-background` suffix
#                        in its filename. Up to 15 minutes runtime. Does
#                        the actual Metabase + Claude + Slack work.

[build]
  functions = "netlify/functions"
  publish    = "public"

# Schedule expressed in standard cron. The schedule runs in UTC.
# Every 15 minutes, every day. We don't currently bother throttling
# overnight -- check + dispatch is essentially free.
[functions."poll-alerts"]
  schedule = "*/15 * * * *"

# Use the Node 20 runtime for everything.
[functions]
  node_bundler = "esbuild"

# Tell Netlify's secret scanner to ignore these env vars. They're all
# non-sensitive config values (public URL, public Slack IDs, a model
# name) that the code carries as sensible defaults. The scanner flags
# them only because they were ticked as "secret" in the UI; the actual
# secrets (API keys, bot tokens, INTERNAL_SECRET) are NOT in the repo.
[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "METABASE_BASE,METABASE_BIGQUERY_DB_ID,SLACK_ALERT_CHANNEL_ID,SLACK_CLINICAL_SUPPORT_SUBTEAM_ID,ANTHROPIC_MODEL"
